# fly.toml app configuration file generated for pair-2 on 2026-05-09T22:16:51Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pair-2'
primary_region = 'lhr'

[build]

[env]
  PORT = '3000'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
